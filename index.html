(function(){
  // 1. 기본 reload 차단
  const noop = function(){ console.log("Blocked reload"); };
  window.location.reload = noop;

  // 2. Sanity Live / Next.js Fast Refresh 웹소켓 & EventSource 끊김에 의한 무한 새로고침 차단
  window.EventSource = function(){ return { close:noop, addEventListener:noop, removeEventListener:noop, readyState:2 }; };
  window.WebSocket = function(){ return { send:noop, close:noop, addEventListener:noop, removeEventListener:noop, readyState:1 }; };

  // 3. location.replace / assign 을 통한 강제 이동 차단
  const _replace = window.location.replace;
  const _assign = window.location.assign;
  window.location.replace = function(url){ if(url !== window.location.href) _replace.call(window.location, url); };
  window.location.assign = function(url){ if(url !== window.location.href) _assign.call(window.location, url); };

  // 4. [Sanity 완전 차단] Sanity Live Preview / Groq 실시간 구독 무력화
  // Sanity client의 listen(), live preview, 실시간 쿼리 차단
  var _origFetch = window.fetch;
  window.fetch = function(url, opts) {
    var urlStr = typeof url === 'string' ? url : (url && url.url) || '';
    // Sanity API 실시간 요청 차단 (listen, live preview)
    if (urlStr.indexOf('sanity.io') !== -1 && (urlStr.indexOf('listen') !== -1 || urlStr.indexOf('mutate') !== -1)) {
      console.log('Blocked Sanity live request:', urlStr);
      return Promise.resolve(new Response('{}', { status: 200, headers: {'Content-Type':'application/json'} }));
    }
    // Sanity CDN groq 쿼리의 반복 polling 차단
    if (urlStr.indexOf('apicdn.sanity.io') !== -1 && urlStr.indexOf('$listen') !== -1) {
      console.log('Blocked Sanity listen:', urlStr);
      return Promise.resolve(new Response('{}', { status: 200, headers: {'Content-Type':'application/json'} }));
    }
    return _origFetch.apply(this, arguments);
  };

  // 5. [Sanity] MutationObserver 기반 자동 새로고침 차단
  // Sanity는 DOM 변경 감지 후 리렌더링 트리거하는 경우가 있음
  var _origMO = window.MutationObserver;

    };
    return new _origMO(wrappedCallback);
  };
  window.MutationObserver.prototype = _origMO.prototype;

  // 6. [Sanity] setInterval/setTimeout 기반 polling 새로고침 차단
  var _origSetInterval = window.setInterval;
  window.setInterval = function(fn, ms) {

    return _origSetInterval.call(window, fn, ms);
  };

  // 7. meta refresh 태그 제거
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('meta[http-equiv="refresh"]').forEach(function(m) { m.remove(); });
    // 폼 submit 전송 차단 (백엔드로 데이터 전송 방지)

    });
  });
})();

<script>
(function() {
  // 1. Next.js App Router RSC 자동 요청 차단 (전체 리로드 방지)
  var _origFetch = window.fetch;
  window.fetch = function(url, opts) {
    var urlStr = typeof url === 'string' ? url : (url && url.url) || '';
    var headers = (opts && opts.headers) || {};
    var isRSC = headers['Next-Router-State-Tree'] ||
                headers['RSC'] === '1' ||
                headers['Next-Url'] ||
                urlStr.indexOf('_rsc=') !== -1;
    if(isRSC) return Promise.resolve(new Response('', { status: 204 }));
    return _origFetch.apply(this, arguments);
  };

  // 2. 동일 URL replaceState 무시 (리로드 루프 방지)
  var _replaceState = history.replaceState;
  history.replaceState = function(state, title, url) {
    if(url && url.toString() === location.pathname + location.search) return;
    return _replaceState.apply(this, arguments);
  };

  // 3. Next.js 링크 클릭 시 일반 페이지 이동으로 강제 전환
  //    단, 해시 링크(#menu, #contact 등)는 건드리지 않음 → 페이지 내 스크롤 유지
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a[href]');
    if (!link) return;
    try {
      var href = link.getAttribute('href') || '';
      if (href.charAt(0) === '#') return; // 해시 링크는 그대로 통과
      var u = new URL(link.href);
      if (u.hash && u.pathname === window.location.pathname) return; // 같은 페이지 내 해시 이동도 통과
      if (u.origin === window.location.origin) {
        e.preventDefault();
        e.stopImmediatePropagation();
        window.location.href = link.href;
      }
    } catch(err) {}
  }, true);
})();
</script>
<script>
(function(){
  var main = document.querySelector('.preloader_preloader_wrapper__fmFqi');
  if(!main) return;
  var slides = main.querySelectorAll('.preloader_img_wrapper__2GjyW');
  var tags = main.querySelectorAll('.preloader_img_tag__gz5Fs');
  var total = slides.length;
  if(total === 0) return;
  var current = 0;

  // 이미지 로드 완료 시 loader 숨기기
  slides.forEach(function(slide){
    var imgs = slide.querySelectorAll('.preloader_img__3Z5cM');
    imgs.forEach(function(img){
      function hideLoader(){
        var loader = slide.querySelector('.preloader_loader__LFd7m');
        if(loader) loader.classList.add('preloader_loaded__h9KBl');
      }
      if(img.complete) hideLoader();
      else img.addEventListener('load', hideLoader);
    });
  });

  // 스크롤/터치 차단
  main.addEventListener('wheel', function(e){ e.preventDefault(); }, {passive:false});

  main.addEventListener('click', function(){ window.location.href = '/commissions'; });

  if(tags[0]) tags[0].className = 'preloader_img_tag__gz5Fs preloader_active__agAXT';
  // 5초마다 슬라이드 전환
  var timer = setInterval(function(){
    if(current < total - 1) {
      current++;

      clearInterval(timer);
      window.location.href = '/commissions';
      return;
    }
    slides.forEach(function(slide){
      slide.style.transform = 'translateY(-' + (100 * current) + '%) translateZ(0px)';

      tag.className = i === current ? 'preloader_img_tag__gz5Fs preloader_active__agAXT' : 'preloader_img_tag__gz5Fs';
    });
  }, 5000);
})();
